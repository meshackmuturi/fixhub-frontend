<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Notification - FixHub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #000 0%, #1a1a1a 50%, #fbbf24 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* Back to Dashboard Button */
        .back-dashboard {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: #fbbf24;
            color: #000;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .back-dashboard:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(251, 191, 36, 0.4);
        }

        .container { max-width: 800px; margin: 0 auto; }

        .header {
            background: #000;
            border: 2px solid #fbbf24;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
        }

        .logo-display {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 10px;
            font-family: 'Arial Black', Arial, sans-serif;
        }

        .logo-fix { color: white; }
        .logo-hub {
            background: #fbbf24;
            color: #000;
            padding: 2px 18px;
            border-radius: 6px;
            margin-left: 2px;
        }

        .header p { color: #ccc; font-size: 16px; }

        .form-card { 
            background: white; 
            border-radius: 15px; 
            padding: 40px; 
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2); 
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: #000;
            margin-bottom: 25px;
            padding-bottom: 12px;
            border-bottom: 3px solid #fbbf24;
        }

        .form-group { margin-bottom: 25px; }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #000;
            margin-bottom: 8px;
        }

        .required { color: #ef4444; margin-left: 3px; }
        .optional { color: #999; font-weight: 400; font-size: 12px; margin-left: 5px; }

        /* Notification Type Selection */
        .notification-type {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .type-option { position: relative; }

        .type-option input[type="radio"] { position: absolute; opacity: 0; }

        .type-label {
            display: block;
            padding: 18px;
            background: #fffbeb;
            border: 2px solid #fde68a;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            color: #000;
        }

        .type-option input[type="radio"]:checked + .type-label {
            background: #fbbf24;
            border-color: #f59e0b;
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4);
        }

        .type-option input[type="radio"]:disabled + .type-label {
            opacity: 0.5;
            cursor: not-allowed;
            background: #f3f4f6;
        }

        .type-label .icon {
            font-size: 24px;
            display: block;
            margin-bottom: 8px;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #fde68a;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Nunito', sans-serif;
            background: #fffbeb;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: #fbbf24;
            background: white;
            box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.1);
        }

        .form-input:read-only {
            background: #f3f4f6;
            cursor: not-allowed;
        }

        .form-textarea { resize: vertical; min-height: 120px; }
        .form-select { cursor: pointer; }

        .form-hint {
            font-size: 13px;
            color: #666;
            margin-top: 6px;
        }

        .warning-hint {
            font-size: 13px;
            color: #ef4444;
            margin-top: 6px;
            font-weight: 600;
        }

        /* Search Dropdown Styles */
        .search-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 2px solid #fbbf24;
            border-radius: 12px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            margin-top: 5px;
        }

        .search-dropdown.show { display: block; }

        .search-item {
            padding: 15px;
            cursor: pointer;
            border-bottom: 1px solid #fde68a;
            transition: background 0.2s;
        }

        .search-item:hover {
            background: #fffbeb;
        }

        .search-item:last-child {
            border-bottom: none;
        }

        .search-item-name {
            font-weight: 700;
            color: #000;
            margin-bottom: 4px;
        }

        .search-item-details {
            font-size: 13px;
            color: #666;
        }

        .no-results {
            padding: 20px;
            text-align: center;
            color: #999;
        }

        .template-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 15px;
        }

        .template-btn {
            padding: 12px;
            background: #fffbeb;
            border: 2px solid #fde68a;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: #000;
            text-align: center;
            transition: all 0.3s;
        }

        .template-btn:hover {
            background: #fef3c7;
        }

        .template-btn.active {
            background: #fbbf24;
            border-color: #f59e0b;
        }

        .char-counter {
            text-align: right;
            font-size: 12px;
            color: #666;
            margin-top: 6px;
        }

        .char-counter.warning { color: #ef4444; font-weight: 600; }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4);
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(251, 191, 36, 0.6);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .success-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .success-modal.show { display: flex; }

        .success-content {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: #fbbf24;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .success-content h2 {
            font-size: 26px;
            margin-bottom: 12px;
            color: #000;
        }

        .success-content p {
            color: #666;
            margin-bottom: 20px;
        }

        .loading-spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #fbbf24;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .notification-type { grid-template-columns: 1fr; }
            .template-buttons { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <a href="Dashboard.html" class="back-dashboard">← Dashboard</a>

    <div class="container">
        <div class="header">
            <div class="logo-display">
                <span class="logo-fix">Fix</span><span class="logo-hub">Hub</span>
            </div>
            <p>Send SMS & Email Notifications</p>
        </div>

        <div class="form-card">
            <form id="notificationForm">
                <div class="section-title">Notification Type</div>
                <div class="notification-type">
                    <div class="type-option">
                        <input type="radio" id="type-sms" name="type" value="sms" checked>
                        <label for="type-sms" class="type-label">
                            <span class="icon">📱</span>
                            SMS Only
                        </label>
                    </div>
                    <div class="type-option">
                        <input type="radio" id="type-email" name="type" value="email">
                        <label for="type-email" class="type-label">
                            <span class="icon">✉️</span>
                            Email Only
                        </label>
                    </div>
                </div>

                <div class="section-title">Customer Details</div>
                
                <div class="form-group">
                    <label class="form-label">Search Customer <span class="required">*</span></label>
                    <input 
                        type="text" 
                        id="customerSearch" 
                        class="form-input" 
                        placeholder="Type customer name or phone number..."
                        autocomplete="off"
                        required
                    >
                    <div class="search-dropdown" id="searchDropdown"></div>
                    <div class="form-hint">Start typing to search customers</div>
                </div>

                <div class="form-group">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" id="phone" class="form-input" readonly placeholder="Auto-filled from customer">
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-input" readonly placeholder="Auto-filled from customer">
                    <div class="form-hint" id="emailHint">Email will be auto-filled if customer provided one</div>
                </div>

                <div class="section-title">Message</div>

                <div class="form-group">
                    <label class="form-label">Quick Templates</label>
                    <div class="template-buttons">
                        <button type="button" class="template-btn active" data-msg="Device received! Updates coming soon. - FixHub">✅ Received</button>
                        <button type="button" class="template-btn" data-msg="Your repair is in progress. We'll notify you when done. - FixHub">🔧 In Progress</button>
                        <button type="button" class="template-btn" data-msg="Great news! Your device is ready for pickup. - FixHub">🎉 Completed</button>
                        <button type="button" class="template-btn" data-msg="Your device is ready for collection. Please pick up. - FixHub">📦 Ready</button>
                        <button type="button" class="template-btn" data-msg="Reminder: Please collect your device to avoid storage fees. - FixHub">⏰ Reminder</button>
                        <button type="button" class="template-btn" data-msg="">✏️ Custom</button>
                    </div>
                </div>

                <div class="form-group" id="subjectGroup">
                    <label class="form-label">Subject <span class="optional">(Email only)</span></label>
                    <input type="text" id="subject" class="form-input" placeholder="e.g., Device Repair Update" value="Device Repair Update - FixHub">
                </div>

                <div class="form-group">
                    <label class="form-label">Message <span class="required">*</span></label>
                    <textarea id="msg" class="form-textarea" required placeholder="Type your message here...">Device received! Updates coming soon. - FixHub</textarea>
                    <div class="char-counter"><span id="charCount">51</span> / 160 characters (SMS limit)</div>
                </div>

                <button type="submit" class="btn-primary" id="submitBtn">📤 Send Notification</button>
            </form>
        </div>
    </div>

    <div class="success-modal" id="modal">
        <div class="success-content">
            <div class="success-icon">✓</div>
            <h2>Notification Sent!</h2>
            <p id="sentDetails">Message delivered successfully</p>
            <button class="btn-primary" onclick="closeModal()">Done</button>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('customerSearch');
        const searchDropdown = document.getElementById('searchDropdown');
        const phoneInput = document.getElementById('phone');
        const emailInput = document.getElementById('email');
        const msgTextarea = document.getElementById('msg');
        const charCount = document.getElementById('charCount');
        const submitBtn = document.getElementById('submitBtn');
        const typeEmail = document.getElementById('type-email');
        const typeSMS = document.getElementById('type-sms');
        const emailHint = document.getElementById('emailHint');

        let customers = [];
        let selectedCustomer = null;

        // Load customers from backend
        async function loadCustomers() {
            try {
                const response = await fetch('https://meshackmuturi.pythonanywhere.com/api/get-customers/');
                const data = await response.json();

                if (data.success) {
                    customers = data.customers;
                    console.log('✅ Loaded', customers.length, 'customers');
                } else {
                    console.error('❌ Error loading customers');
                }
            } catch (error) {
                console.error('❌ Connection error:', error);
            }
        }

        // Search functionality
        searchInput.addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase().trim();

            if (searchTerm.length < 2) {
                searchDropdown.classList.remove('show');
                return;
            }

            // Filter customers by name or phone
            const filtered = customers.filter(customer => 
                customer.full_name.toLowerCase().includes(searchTerm) ||
                customer.phone_number.includes(searchTerm)
            );

            if (filtered.length === 0) {
                searchDropdown.innerHTML = '<div class="no-results">No customers found</div>';
                searchDropdown.classList.add('show');
                return;
            }

            // Display results
            searchDropdown.innerHTML = filtered.map(customer => `
                <div class="search-item" onclick='selectCustomer(${JSON.stringify(customer)})'>
                    <div class="search-item-name">${customer.full_name}</div>
                    <div class="search-item-details">
                        ${customer.phone_number} ${customer.email ? '• ' + customer.email : ''}
                    </div>
                </div>
            `).join('');

            searchDropdown.classList.add('show');
        });

        // Click outside to close dropdown
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.form-group')) {
                searchDropdown.classList.remove('show');
            }
        });

        // Select customer from search results
        function selectCustomer(customer) {
            selectedCustomer = customer;

            searchInput.value = customer.full_name;
            phoneInput.value = customer.phone_number;
            emailInput.value = customer.email || '';

            searchDropdown.classList.remove('show');

            // Check if customer has email
            if (customer.email) {
                typeEmail.disabled = false;
                emailHint.className = 'form-hint';
                emailHint.textContent = '✅ Customer has email - Email option available';
            } else {
                typeEmail.disabled = true;
                typeSMS.checked = true;
                emailHint.className = 'warning-hint';
                emailHint.textContent = '⚠️ This customer has no email - SMS only';
            }
        }

        // Template buttons
        document.querySelectorAll('.template-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.template-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                msgTextarea.value = this.dataset.msg;
                updateCharCount();
            });
        });

        // Character counter
        function updateCharCount() {
            const count = msgTextarea.value.length;
            charCount.textContent = count;
            document.querySelector('.char-counter').classList.toggle('warning', count > 160);
        }

        msgTextarea.addEventListener('input', updateCharCount);

        // Form submission
        document.getElementById('notificationForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // Validate customer selected
            if (!selectedCustomer) {
                alert('Please search and select a customer');
                return;
            }

            const notificationType = document.querySelector('input[name="type"]:checked').value;
            
            // Validate email if email type selected
            if (notificationType === 'email' && !emailInput.value) {
                alert('This customer has no email address.\n\nPlease:\n1. Select "SMS Only", or\n2. Choose a customer with an email address');
                return;
            }

            // Prepare data
            const formData = {
                phone: phoneInput.value,
                email: emailInput.value,
                type: notificationType,
                subject: document.getElementById('subject').value,
                message: msgTextarea.value
            };

            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            try {
                // Send to backend
                const response = await fetch('https://meshackmuturi.pythonanywhere.com/api/send-notification/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (data.success) {
                    const typeText = notificationType === 'sms' ? 'SMS' : 'Email';
                    
                    document.getElementById('sentDetails').textContent = 
                        `${typeText} sent to ${selectedCustomer.full_name} successfully!`;
                    
                    document.getElementById('modal').classList.add('show');
                    
                    // Reset form
                    document.getElementById('notificationForm').reset();
                    searchInput.value = '';
                    phoneInput.value = '';
                    emailInput.value = '';
                    selectedCustomer = null;
                    updateCharCount();
                    
                    console.log('✅ Notification sent:', data);
                } else {
                    alert('Error: ' + data.error);
                    console.error('❌ Backend error:', data);
                }
            } catch (error) {
                console.error('❌ Connection error:', error);
                alert('Failed to send notification!\n\nMake sure:\n1. Backend is running\n2. SMS/Email is configured\n3. Customer details are correct');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '📤 Send Notification';
            }
        });

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
            window.location.href = 'Dashboard.html';
        }

        // Load customers when page loads
        window.addEventListener('DOMContentLoaded', loadCustomers);

        // Initial character count
        updateCharCount();
    </script>
</body>
</html>
